name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-file-share-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-file-share-

      - run: npm ci

      - run: npm run lint
      - run: npm audit --audit-level=high
      - run: npm run build
