<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <meta name="supported-color-schemes" content="light">
  <title>確認コードのご案内</title>
</head>
<body style="margin: 0; padding: 0; width: 100%; background-color: #ecfdf5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', Meiryo, sans-serif; -webkit-font-smoothing: antialiased;">
  <table border="0" cellpadding="0" cellspacing="0" width="100%" role="presentation" style="background-color: #ecfdf5; background-image: linear-gradient(180deg, #ecfdf5 0%, #f8fafc 48%, #eff6ff 100%);">
    <tr>
      <td align="center" style="padding: 40px 16px;">
        <table border="0" cellpadding="0" cellspacing="0" width="100%" role="presentation" style="max-width: 520px; background-color: #ffffff; border-radius: 16px; border: 1px solid #d1fae5; box-shadow: 0 8px 32px rgba(16, 185, 129, 0.08), 0 2px 8px rgba(15, 23, 42, 0.04); overflow: hidden;">
          <!-- アクセントバー（ログイン画面の emerald グラデーション） -->
          <tr>
            <td height="4" style="background-color: #10b981; background-image: linear-gradient(90deg, #10b981 0%, #14b8a6 100%); font-size: 0; line-height: 0;">&nbsp;</td>
          </tr>

          <!-- ヘッダー：Gift アイコン + ブランド名 -->
          <tr>
            <td align="center" style="padding: 32px 32px 8px 32px;">
              <table border="0" cellpadding="0" cellspacing="0" role="presentation">
                <tr>
                  <td align="center" style="width: 56px; height: 56px;">
                    <img
                      src="{{ .SiteURL }}/apple-touch-icon.png"
                      width="56"
                      height="56"
                      alt="だんごシェアリンク"
                      style="display: block; width: 56px; height: 56px; border: 0; border-radius: 16px; outline: none; text-decoration: none;"
                    />
                  </td>
                </tr>
              </table>
              <p style="margin: 16px 0 4px 0; font-size: 18px; font-weight: 700; color: #171717; letter-spacing: -0.02em;">
                だんごシェアリンク
              </p>
              <p style="margin: 0; font-size: 12px; color: #6b7280; letter-spacing: 0.04em;">
                安全で、美しいファイル共有
              </p>
            </td>
          </tr>

          <!-- 本文 -->
          <tr>
            <td style="padding: 8px 32px 28px 32px;">
              <h1 style="margin: 0 0 12px 0; font-size: 22px; font-weight: 700; text-align: center; color: #171717; line-height: 1.35;">
                確認コード
              </h1>
              <p style="margin: 0 0 24px 0; font-size: 15px; line-height: 1.7; text-align: center; color: #525252;">
                サインインまたは登録を完了するために、<br>
                画面に次の <strong style="color: #171717;">6桁のコード</strong> を入力してください。
              </p>

              <!-- OTP（GlassCard + emerald アクセント） -->
              <table border="0" cellpadding="0" cellspacing="0" width="100%" role="presentation" style="margin: 0 0 20px 0;">
                <tr>
                  <td align="center">
                    <table border="0" cellpadding="0" cellspacing="0" role="presentation" style="background-color: #ecfdf5; border: 2px solid #6ee7b7; border-radius: 12px;">
                      <tr>
                        <td align="center" style="padding: 20px 32px;">
                          <p style="margin: 0 0 6px 0; font-size: 11px; font-weight: 600; color: #059669; letter-spacing: 0.08em;">
                            確認コード
                          </p>
                          <p style="margin: 0; font-family: ui-monospace, 'SF Mono', 'Courier New', Courier, monospace; font-size: 34px; font-weight: 700; color: #171717; letter-spacing: 0.2em;">
                            {{ .Token }}
                          </p>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>

              <p style="margin: 0 0 8px 0; font-size: 13px; line-height: 1.6; text-align: center; color: #737373;">
                有効期限は <strong style="color: #525252;">60分間</strong> です。
              </p>
              <p style="margin: 0; font-size: 12px; line-height: 1.6; text-align: center; color: #a3a3a3;">
                身に覚えのない場合は、このメールを無視してください。
              </p>
            </td>
          </tr>

          <!-- フッター -->
          <tr>
            <td style="padding: 20px 32px 28px 32px; background-color: #fafafa; border-top: 1px solid #f0fdf4; text-align: center;">
              <p style="margin: 0 0 6px 0; font-size: 11px; color: #a3a3a3;">
                &copy; 2026 だんごシェアリンク
              </p>
              <p style="margin: 0; font-size: 11px; line-height: 1.5; color: #d4d4d4;">
                このメールは自動送信です。返信には対応できません。
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
